name = "Avalonia"
grammar = "xml"
path_suffixes = ["axaml"]
line_comments = ["<!-- "]
tab_size = 4
autoclose_before = ";:.,=}])>/ "
brackets = [
  { start = "<", end = ">", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
block_comment = ["<!-- ", " -->"]
